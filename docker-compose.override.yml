# Local dev only. Compose auto-merges this over docker-compose.yml, so the same
# `docker compose ...` commands give a live-code setup here and the baked prod image elsewhere.
# Bind-mounts ./src so edits/git pulls are live without a rebuild, and brings the host's
# dev composer deps (PHPUnit etc.) + built assets into the container.
services:
  app:
    volumes:
      - ./src:/var/www/html
  # nginx serves static files itself; without the same mount it keeps serving the
  # image's baked assets while PHP reads the host's Vite manifest — hash mismatch, 404s, no CSS.
  nginx:
    volumes:
      - ./src:/var/www/html
      - storage:/var/www/html/storage/app/public
  worker:
    volumes:
      - ./src:/var/www/html
  scheduler:
    volumes:
      - ./src:/var/www/html
