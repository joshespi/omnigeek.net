# Local dev only. Compose auto-merges this over docker-compose.yml, so the same
# `docker compose ...` commands give a live-code setup here and the baked prod image elsewhere.
# Bind-mounts ./src so edits/git pulls are live without a rebuild, and brings the host's
# dev composer deps (PHPUnit etc.) + built assets into the container.
services:
  app:
    volumes:
      - ./src:/var/www/html
