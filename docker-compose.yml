services:
  app:
    build: .
    env_file: .env
    volumes:
      - ./src:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    networks:
      - laravel_net

  nginx:
    image: nginx:alpine
    ports:
      - "8084:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel_net

  db:
    image: mariadb:11.4
    restart: always
    env_file: .env
    environment:
      MARIADB_DATABASE: laravel
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - ./db_data:/var/lib/mysql
    networks:
      - laravel_net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  node:
    image: node:24-alpine
    working_dir: /app
    volumes:
      - ./src:/app
    profiles:
      - tools

networks:
  laravel_net:

volumes:
  db_data:
