server {
    listen 80;
    server_name omnigeek.net www.omnigeek.net;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name omnigeek.net www.omnigeek.net;

    ssl_certificate /etc/letsencrypt/live/omnigeek.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/omnigeek.net/privkey.pem;

    # HSTS (ngx_http_headers_module is required) (63072000 seconds)
    add_header Strict-Transport-Security "max-age=63072000" always;

    location / {
        proxy_pass http://192.168.86.42:8084/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
